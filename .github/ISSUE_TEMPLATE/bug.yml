name: Bug
description: Report something that is broken
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Simple bugs can skip the full spec workflow. Complex bugs that require design work should include acceptance criteria, scope boundary, and workflow agent selection below.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `docker run ...`
        2. Wait for DHCP
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: How do we know this is fixed? Optional for simple bugs, required if this triggers the spec workflow.
    validations:
      required: false
  - type: textarea
    id: scope-boundary
    attributes:
      label: Not in scope
      description: What is explicitly NOT part of this fix? Optional for simple bugs.
    validations:
      required: false
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: Implementation priority. P0 = critical path, P1 = important, P2 = nice to have.
      options:
        - P0 (critical path)
        - P1 (important)
        - P2 (nice to have)
    validations:
      required: true
  - type: dropdown
    id: agents
    attributes:
      label: Workflow agents
      description: Leave blank for simple fixes. Select an option if this bug requires the full spec workflow.
      options:
        - Claude only
        - Claude + Gemini
        - Claude + Codex
        - All three (Claude + Gemini + Codex)
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, config, screenshots, OS version, Docker version, etc.
    validations:
      required: false
