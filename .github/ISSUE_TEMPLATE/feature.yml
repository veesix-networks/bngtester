name: Feature
description: Request a new capability (subscriber image, collector feature, CI pipeline, etc.)
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        All features go through the [AI workflow](../../context/PROCESS.md). This issue becomes the source of truth for the spec and implementation.
  - type: textarea
    id: description
    attributes:
      label: What
      description: What specific deliverable do you want? Be concrete.
      placeholder: "e.g., Add Ubuntu 24.04 subscriber image with dhcpcd"
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Why
      description: What problem does this solve? What's the motivation?
      placeholder: "e.g., Ubuntu 24.04 is the current LTS and we need coverage for it"
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: How do we know this is done? List concrete, testable criteria.
      placeholder: |
        - [ ] Dockerfile builds successfully
        - [ ] Container obtains DHCP lease via QinQ
        - [ ] CI publishes image to GHCR
    validations:
      required: true
  - type: textarea
    id: scope-boundary
    attributes:
      label: Not in scope
      description: What is explicitly NOT part of this issue? This prevents scope creep.
      placeholder: "e.g., Does not include IPv6 support, does not modify the collector"
    validations:
      required: true
  - type: dropdown
    id: agents
    attributes:
      label: Workflow agents
      description: Which agents should review the spec? Select one option.
      options:
        - Claude only
        - Claude + Gemini
        - Claude + Codex
        - All three (Claude + Gemini + Codex)
    validations:
      required: true
